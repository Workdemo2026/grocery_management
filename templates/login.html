<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login | FreshMart</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

    <div class="logo">

        🛒 FreshMart

    </div>

    <nav>

        <a href="/">Home</a>

        <a href="/user">Shop</a>

    </nav>

</header>

<div class="login-container">

    <div class="login-card">

        <h1>

            Administrator Login

        </h1>

        <p>

            Please enter your administrator credentials.

        </p>

        {% if error %}

        <div class="error-message">

            {{ error }}

        </div>

        {% endif %}

        <form action="/login" method="POST">

            <label>

                Username

            </label>

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>

            <label>

                Password

            </label>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            <button type="submit">

                Login

            </button>

        </form>

        <div class="back-home">

            <a href="/">

                ← Back to Home

            </a>

        </div>

    </div>

</div>

<footer>

    <p>

        © 2026 FreshMart Grocery Management System

    </p>

</footer>

</body>

</html>
